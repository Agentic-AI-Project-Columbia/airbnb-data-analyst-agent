services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-}
      - GCP_LOCATION=${GCP_LOCATION:-global}
      - DATA_DIR=/data
      - CORS_ALLOW_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - "./Sample Data:/data:ro"
      - "./backend/artifacts:/app/artifacts"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
