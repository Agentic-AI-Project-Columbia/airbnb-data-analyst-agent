steps:
  # 1. Create backend/data/ directory and download CSVs from GCS
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'mkdir -p backend/data && gsutil -m cp gs://agentic-ai-487000-airbnb-data/*.csv backend/data/'

  # 2. Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/airbnb-repo/airbnb-backend:latest'
      - './backend'

  # 3. Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east1-docker.pkg.dev/$PROJECT_ID/airbnb-repo/airbnb-backend:latest']

  # 4. Deploy backend to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'airbnb-backend'
      - '--image=us-east1-docker.pkg.dev/$PROJECT_ID/airbnb-repo/airbnb-backend:latest'
      - '--region=us-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8000'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=600'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=DATA_DIR=/data,GCP_PROJECT_ID=$PROJECT_ID,GCP_LOCATION=global,CORS_ALLOW_ORIGINS=*'
      - '--session-affinity'

  # 5. Capture backend URL for frontend build
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'gcloud run services describe airbnb-backend --region=us-east1 --format="value(status.url)" > /workspace/backend_url.txt && echo "Backend URL: $(cat /workspace/backend_url.txt)"'

  # 6. Build frontend image with backend URL baked in
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker build --build-arg NEXT_PUBLIC_BACKEND_URL=$(cat /workspace/backend_url.txt) -t us-east1-docker.pkg.dev/$PROJECT_ID/airbnb-repo/airbnb-frontend:latest ./frontend'

  # 7. Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east1-docker.pkg.dev/$PROJECT_ID/airbnb-repo/airbnb-frontend:latest']

  # 8. Deploy frontend to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'airbnb-frontend'
      - '--image=us-east1-docker.pkg.dev/$PROJECT_ID/airbnb-repo/airbnb-frontend:latest'
      - '--region=us-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60'
      - '--min-instances=0'
      - '--max-instances=3'

images:
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/airbnb-repo/airbnb-backend:latest'
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/airbnb-repo/airbnb-frontend:latest'

timeout: '2400s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
